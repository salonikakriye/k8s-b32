apiVersion: autoscaling/v1
kind:  HorizontalPodAutoscaler
metadata:
   name: hpa
   labels:
     app: myapp
     namespace: hpa
spec:
   scaleTargetRef:
      apiVersion: apps/v1
      kind: Deployment
      name: my-deployment
   minReplicas: 1
   maxReplicas: 5
   metrics:
     - type: Resources
       resources:
         name: cpu 
         target: 
           type: Utilization
           averageUtilization: 40 

  
