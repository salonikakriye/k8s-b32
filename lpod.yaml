apiVersion: v1
kind: Pod
metadata:
  name: lbpod
  labels:
    app: lbpod
spec: 
  containers:
    - name: nginx-container
      image: nginx:latest
      ports:
        - name: nginxport
          containerPort: 80
...
---
apiVersion: v1
kind: Service
metadata:
   name: lbpod-service
   labels:
    app: lpod
spec:
   type: LoadBalancer
   selector:
    app: lpod
   ports:
    - name: nginxsvc-port
      protocol: TCP
      port: 80
      targetPort: 80