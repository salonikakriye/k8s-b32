apiVersion: v1
kind: Pod
metadata:
  name: mypod
  labels:
     app: myapp
spec:
  containers:
    - name: nginx-cont
      image: nginx
      ports:
       - name: nginxport
         containerPort: 80
...
---
apiVersion: v1
kind: service
metadata:
  name: ciservice
  labels:
    app: myapp
spec:
  type: ClusterIP
  selector:
    app: myapp
  ports:
    - name: nginxsvc-port
      portocol: TCP
      port: 80
      targetport: 80
