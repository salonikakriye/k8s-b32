apiVersion: apps/v1
kind: Deployment
matadata:
  name: myapp
  labels:
    app: myapp
spec:
   replicas: 5
   selector:
     matchlabels:
       app: myapp
   strategy:
     type: RollingUpdate
     rollingupdate:
       maxsurge: 1
       maxUnavilable: 1
     template:
       metadata:
         name: my-template 
         labels:
           app: myapp
       spec:
         containers:
           - name: nginx
             image: nginx:latest
             port:
               - name: nginx-port
                 containerport: 80
...
---
apiVersion: v1 
kind: Service
metadata:
  - name: deploy-svc
    labels:
      app: myapp
spec: 
   type: NodePort
   selector: 
     app: myapp
   ports: 
      - name: nginxsvcport
        protocol: TCP 
        port: 80
        targetPort: 80